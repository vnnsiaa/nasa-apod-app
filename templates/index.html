<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA - Astronomy Picture of the Day</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a1a;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        header {
            background-color: #0d1b2a;
            padding: 20px 40px;
            border-bottom: 2px solid #1e90ff;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        header h1 {
            font-size: 24px;
            color: #1e90ff;
            letter-spacing: 2px;
        }

        header span {
            font-size: 13px;
            color: #aaaaaa;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            align-items: center;
        }

        .controls input[type="date"] {
            background-color: #0d1b2a;
            border: 1px solid #1e3a5f;
            color: #ffffff;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .controls button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            background-color: #1e90ff;
            color: #ffffff;
            transition: opacity 0.2s;
        }

        .controls button:hover {
            opacity: 0.85;
        }

        .card {
            background-color: #0d1b2a;
            border: 1px solid #1e3a5f;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(30, 144, 255, 0.1);
        }

        .card img {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            display: block;
        }

        .card iframe {
            width: 100%;
            height: 450px;
            border: none;
            display: block;
        }

        .card-body {
            padding: 30px;
        }

        .badge {
            display: inline-block;
            background-color: #1e3a5f;
            color: #1e90ff;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .date {
            font-size: 13px;
            color: #1e90ff;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .title {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffffff;
            line-height: 1.4;
        }

        .explanation {
            font-size: 15px;
            color: #cccccc;
            line-height: 1.8;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #444444;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🚀 NASA APOD</h1>
        <span>Astronomy Picture of the Day</span>
    </header>

    <div class="container">

        <form class="controls" method="GET" action="/">
            <input type="date" name="tanggal"
                min="1995-06-16"
                max="2026-04-13"
                value="{{ tanggal }}">
            <button type="submit">🔍 Cari</button>
        </form>

        <div class="card">

            {% if data.media_type == "image" %}
                <img src="{{ data.url }}" alt="{{ data.title }}">
            {% else %}
                <iframe src="{{ data.url }}" allowfullscreen></iframe>
            {% endif %}

            <div class="card-body">
                <div class="badge">NASA • APOD</div>
                <div class="date">📅 {{ data.date }}</div>
                <div class="title">{{ data.title }}</div>
                <div class="explanation">{{ data.explanation }}</div>
            </div>

        </div>
    </div>

    <footer>
        Data dari NASA Astronomy Picture of the Day API
    </footer>

</body>
</html>
